name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Unit tests
        run: bunx vitest run
      - name: Build dist
        run: bun run build
      - name: Validate published types
        run: |
          bunx tsc --noEmit --strict --skipLibCheck dist/index.d.ts dist/discord.d.ts dist/slack.d.ts dist/github.d.ts
